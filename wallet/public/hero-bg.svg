<svg width="800" height="1200" viewBox="0 0 800 1200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Abstract flowing shapes in darker green tones -->
  <rect width="800" height="1200" fill="#8dd885"/>

  <!-- Large organic blob top-right -->
  <ellipse cx="650" cy="200" rx="350" ry="280" fill="#7cc873" opacity="0.6"/>

  <!-- Medium blob center-left -->
  <ellipse cx="100" cy="500" rx="300" ry="250" fill="#9ae392" opacity="0.5"/>

  <!-- Small accent circle -->
  <circle cx="600" cy="700" r="150" fill="#6bc462" opacity="0.3"/>

  <!-- Flowing curve -->
  <path d="M0 400 Q200 300 400 450 Q600 600 800 350" stroke="#6bc462" stroke-width="2" fill="none" opacity="0.4"/>
  <path d="M0 500 Q300 350 500 500 Q700 650 800 450" stroke="#b5f0ae" stroke-width="1.5" fill="none" opacity="0.3"/>

  <!-- Subtle grid dots -->
  <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <circle cx="20" cy="20" r="1" fill="#1a1a1a" opacity="0.06"/>
  </pattern>
  <rect width="800" height="1200" fill="url(#dots)"/>

  <!-- Geometric accent shapes -->
  <rect x="500" y="150" width="80" height="80" rx="20" fill="#ffffff" opacity="0.08" transform="rotate(15 540 190)"/>
  <rect x="120" y="300" width="60" height="60" rx="15" fill="#ffffff" opacity="0.06" transform="rotate(-10 150 330)"/>
  <circle cx="350" cy="250" r="30" fill="#ffffff" opacity="0.05"/>
  <circle cx="680" cy="500" r="20" fill="#ffffff" opacity="0.07"/>
</svg>
